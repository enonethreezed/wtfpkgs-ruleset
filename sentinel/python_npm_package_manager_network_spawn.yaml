id: 0ba0f5c6-7434-4c50-b534-b5ff02da1137
name: pip or npm Package Manager Spawns Network Process During Installation
description: |
  Detects pip (Python) or npm (Node.js) spawning network utilities (curl, wget)
  or shells with network indicators during package installation lifecycle.
  Covers WTFpkg techniques PIP-01, PIP-04 (setup.py execution and cmdclass override)
  and NPM-02 (lifecycle script abuse: preinstall, postinstall, prepare).

  The rule requires the child process command line to contain HTTP URLs,
  /dev/tcp patterns, base64 decode patterns, or eval invocations — reducing
  false positives from legitimate build steps (node-gyp, gcc wrappers).

  Data source: Microsoft Defender for Endpoint (DeviceProcessEvents).
severity: High
status: Available
requiredDataConnectors:
  - connectorId: MicrosoftDefenderAdvancedThreatProtection
    dataTypes:
      - DeviceProcessEvents
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - Execution
  - CredentialAccess
relevantTechniques:
  - T1195.001
  - T1059.006
  - T1059.007
  - T1059.004
  - T1552.001
query: |
  // Parent process context for pip and npm installation operations
  let PipParents = dynamic(["pip", "pip3"]);
  let NpmParents = dynamic(["node", "nodejs"]);
  let SuspiciousChildren = dynamic(["curl", "wget", "bash", "sh", "dash", "nc",
                                     "ncat", "python", "python3", "perl"]);
  let NetworkIndicators = dynamic(["http://", "https://", "/dev/tcp/", "/dev/udp/",
                                    "base64 -d", "base64 --decode", "eval $(", " -e "]);
  let LegitimateExclusions = dynamic(["gcc", "g++", "cc", "make", "node-gyp",
                                       "node_modules/.bin/", "pkg-config"]);
  DeviceProcessEvents
  | where TimeGenerated > ago(1h)
  // pip invocations
  | where (InitiatingProcessFileName in~ (PipParents) and
           InitiatingProcessCommandLine has_any ("install", "develop", "egg_info"))
       or (InitiatingProcessFileName in~ (NpmParents) and
           // Node spawned by npm lifecycle — the grandparent would be npm
           InitiatingProcessParentFileName in~ (dynamic(["npm", "npx"])))
  | where FileName in~ (SuspiciousChildren)
  // Require network indicators in child command line
  | where ProcessCommandLine has_any (NetworkIndicators)
  // Exclude known-legitimate build tools
  | where not (ProcessCommandLine has_any (LegitimateExclusions))
  // Enrich
  | extend
      PackageManager = iff(InitiatingProcessFileName in~ (PipParents), "pip", "npm"),
      AlertDetail = strcat(PackageManager, " install spawned ", FileName,
                           " with network activity on ", DeviceName)
  | project
      TimeGenerated,
      DeviceName,
      AccountName,
      AccountDomain,
      PackageManager,
      InitiatingProcessFileName,
      InitiatingProcessCommandLine,
      FileName,
      ProcessCommandLine,
      ProcessId,
      AlertDetail
  | order by TimeGenerated desc
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: FullName
        columnName: DeviceName
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: NTDomain
        columnName: AccountDomain
  - entityType: Process
    fieldMappings:
      - identifier: ProcessId
        columnName: ProcessId
      - identifier: CommandLine
        columnName: ProcessCommandLine
customDetails:
  PackageManager: PackageManager
  ParentCommand: InitiatingProcessCommandLine
  SuspiciousCommand: ProcessCommandLine
alertDetailsOverride:
  alertDisplayNameFormat: "{{PackageManager}} install spawned {{FileName}} on {{DeviceName}}"
  alertDescriptionFormat: "{{AlertDetail}} — Command: {{ProcessCommandLine}}"
version: 1.0.0
kind: Scheduled
metadata:
  source:
    kind: Community
  author:
    name: wtfpkg-rules
  support:
    tier: Community
  categories:
    domains: ["Security - Others", "Supply Chain"]
