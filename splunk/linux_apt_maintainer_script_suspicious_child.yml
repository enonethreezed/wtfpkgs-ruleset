name: Linux APT dpkg Maintainer Script Spawns Suspicious Child Process
id: f19b1143-38af-40d2-b695-492bab1e9f97
version: 1
date: '2026-05-31'
author: wtfpkg-rules
status: production
type: TTP
description: >
  Detects dpkg or apt spawning network utilities (curl, wget), shells, or interpreters
  as direct children during package installation. Legitimate maintainer scripts
  (preinst, postinst, prerm, postrm) configure services, create directories, or run
  ldconfig — they do not initiate outbound connections or spawn interactive shells.
  An attacker who controls a .deb package can embed arbitrary shell commands that
  execute with root privileges during installation, making this a critical indicator
  of APT supply-chain compromise (WTFpkg APT-04).
data_source:
  - Sysmon for Linux EventID 1
  - CrowdStrike Falcon Endpoint
  - Elastic Endpoint
search: >
  | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime
    from datamodel=Endpoint.Processes
    where (Processes.parent_process_name IN ("apt-get", "apt", "dpkg")
           AND Processes.process_name IN ("bash", "sh", "dash", "curl", "wget", "nc",
                                          "ncat", "python", "python3", "perl", "ruby"))
    AND NOT (Processes.process IN ("*update-alternatives*", "*ldconfig*",
                                    "*systemctl daemon-reload*", "*mandb*",
                                    "*fc-cache*", "*gtk-update-icon-cache*",
                                    "*udevadm*", "*depmod*", "*glib-compile*"))
    by Processes.dest, Processes.user, Processes.parent_process_name,
       Processes.process_name, Processes.process, Processes.parent_process
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
how_to_implement: >
  This detection requires endpoint telemetry that maps to the Splunk CIM Endpoint
  data model (Processes node). Deploy Sysmon for Linux with a configuration that
  captures process creation events (EventID 1) and map them using the Splunk
  Add-on for Sysmon. Alternatively, CrowdStrike Falcon, Elastic Endpoint, or any
  EDR that populates parent_process_name fields will work.
  The macro security_content_summariesonly must point to an accelerated data model.
known_false_positives: >
  Third-party .deb packages with non-standard postinst logic (e.g. calling a shell
  wrapper for service restart). Add known-good process paths to the NOT filter.
  Configuration management tools (Ansible/Chef) running dpkg inside agents may
  also fire — allowlist their process trees.
references:
  - https://github.com/0xv1n/WTFpkg/blob/main/content/techniques/apt-preinst-postinst-scripts.md
  - https://www.debian.org/doc/debian-policy/ch-maintainerscripts.html
tags:
  analytic_story:
    - Linux Supply Chain Compromise
    - Linux Package Manager Abuse
  asset_type: Endpoint
  confidence: 80
  impact: 90
  message: >
    APT/dpkg process $parent_process_name$ on $dest$ spawned suspicious child
    $process_name$ (command: $process$). User: $user$.
    Possible malicious maintainer script execution (WTFpkg APT-04).
  mitre_attack_id:
    - T1195.001
    - T1059.004
  observable:
    - name: dest
      type: Hostname
      role:
        - Victim
    - name: user
      type: User
      role:
        - Victim
    - name: process_name
      type: Process
      role:
        - Attacker
  product:
    - Splunk Enterprise Security
    - Splunk Cloud
  required_fields:
    - _time
    - Processes.dest
    - Processes.user
    - Processes.parent_process_name
    - Processes.process_name
    - Processes.process
    - Processes.parent_process
  risk_score: 72
  security_domain: endpoint
