name: Linux pip setup.py Spawns Network or Shell Process
id: 772cdff3-ff5f-4c10-a10d-f2ec1c0c555d
version: 1
date: '2026-05-31'
author: wtfpkg-rules
status: production
type: TTP
description: >
  Detects pip or Python setup.py spawning network utilities (curl, wget) or
  shells as direct child processes during package installation. This covers
  both classic setup.py execution and cmdclass overrides (WTFpkg PIP-01, PIP-04).
  Legitimate pip operations compile C extensions and copy files; they do not
  independently establish outbound TCP connections or invoke interactive shells.
  This pattern is a strong indicator of a malicious Python package attempting
  credential exfiltration, reverse shell establishment, or persistent backdoor
  installation on developer machines and CI/CD runners.
data_source:
  - Sysmon for Linux EventID 1
  - CrowdStrike Falcon Endpoint
  - Elastic Endpoint
search: >
  | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime
    from datamodel=Endpoint.Processes
    where (Processes.parent_process IN ("*pip install*", "*pip3 install*",
                                         "*setup.py install*", "*setup.py develop*",
                                         "*setup.py egg_info*", "*setup.py build_ext*"))
      AND Processes.process_name IN ("curl", "wget", "bash", "sh", "nc", "ncat",
                                      "python", "python3", "perl")
      AND NOT Processes.process IN ("*gcc*", "*g++*", "*cc*", "*make*", "*node-gyp*")
    by Processes.dest, Processes.user, Processes.parent_process,
       Processes.process_name, Processes.process
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
how_to_implement: >
  Requires CIM-compliant endpoint telemetry with full command-line logging for
  both parent and child processes. The Processes.parent_process field must contain
  the full command line of the parent, not just the process name — verify your
  EDR Add-on maps this correctly. In Sysmon for Linux, ParentCommandLine maps to
  Processes.parent_process in the Splunk Add-on for Sysmon.
known_false_positives: >
  Python packages that legitimately invoke curl to download pre-built binary assets
  during installation (esbuild-style patterns). These should be allowlisted by
  package name after review and added to the NOT filter by Processes.process path.
  Compiler invocations (gcc, make) are already excluded.
references:
  - https://github.com/0xv1n/WTFpkg/blob/main/content/techniques/pip-setup-py-execution.md
  - https://github.com/0xv1n/WTFpkg/blob/main/content/techniques/pip-cmdclass-override.md
tags:
  analytic_story:
    - Linux Supply Chain Compromise
    - Python Package Manager Abuse
  asset_type: Endpoint
  confidence: 75
  impact: 90
  message: >
    pip/setup.py process on $dest$ spawned $process_name$ (command: $process$).
    Parent: $parent_process$. User: $user$.
    Possible malicious Python package executing payload during installation (WTFpkg PIP-01/PIP-04).
  mitre_attack_id:
    - T1195.001
    - T1059.006
  observable:
    - name: dest
      type: Hostname
      role:
        - Victim
    - name: user
      type: User
      role:
        - Victim
    - name: process_name
      type: Process
      role:
        - Attacker
  product:
    - Splunk Enterprise Security
    - Splunk Cloud
  required_fields:
    - _time
    - Processes.dest
    - Processes.user
    - Processes.parent_process
    - Processes.process_name
    - Processes.process
  risk_score: 68
  security_domain: endpoint
